name: Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: golangci-lint
        # v8 of the action is required for golangci-lint v2; the project's
        # .golangci.yml is in the v2 config format.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: ./...
